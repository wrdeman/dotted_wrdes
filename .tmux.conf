set -g default-shell /bin/zsh

# Make it use C-a, similar to screen..
unbind C-b
unbind l
set -g prefix C-z
bind-key C-z last-window

# Reload key
bind r source-file ~/.tmux.conf
set-window-option -g mode-keys vi

set -g default-terminal "tmux-256color"
set -g history-limit 50000

#-------------------------------------------------------------------------
#- Claude Code compatibility (https://code.claude.com/docs/en/terminal-config#configure-tmux)
#- allow-passthrough: let desktop notifications + progress bar reach the outer terminal
#- extended-keys: let tmux tell Shift+Enter apart from plain Enter (newline in prompt)
#- RGB: truecolor so Claude themes render correctly (requires tmux >= 3.2)
#-------------------------------------------------------------------------
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys:RGB'

#-------------------------------------------------------------------------
#- looks
#-------------------------------------------------------------------------

set -g pane-active-border-style fg=blue

# setw -g utf8 on

# set -g status-utf8 on
set -g status-interval 10

set -g status-style fg=white,bg=default
# set -g status-bg default

set -g status-left  ""
set -g status-right ""
#vim tmux conf
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?x?)(diff)?$"'
bind -n C-h if-shell "$is_vim" "send-keys C-h" "select-pane -L"
bind -n C-j if-shell "$is_vim" "send-keys C-j" "select-pane -D"
bind -n C-k if-shell "$is_vim" "send-keys C-k" "select-pane -U"
bind -n C-l if-shell "$is_vim" "send-keys C-l" "select-pane -R"
bind -n 'C-\' if-shell "$is_vim" "send-keys 'C-\\'" "select-pane -l"
#scrolling
# NOTE: smcup@/rmcup@ disables the alternate screen so full-screen apps (vim,
# tmux copy-mode) draw into normal scrollback. This BREAKS Claude Code fullscreen
# rendering (/tui fullscreen, CLAUDE_CODE_NO_FLICKER) and nvim's alt-screen.
# Re-enable the line below only if you prefer terminal-native scrollback over those.
# set -g terminal-overrides 'xterm*:smcup@:rmcup@'


set -g status-left-length 100
set -g status-right-length 50
set -g message-style fg=white,bg=black,bright

# default window title colors
set-window-option -g window-status-style fg=white,bg=default,dim

# active window title colors
set-window-option -g window-status-current-style fg=colour10,bg=default,dim



# pane zoom
bind '+' new-window -d -n tmux-zoom 'clear && echo TMUX ZOOM && read' \; swap-pane -s tmux-zoom.0 \; select-window -t tmux-zoom
bind '-' last-window \; swap-pane -s tmux-zoom.0 \; kill-window -t tmux-zoom


#bind '/' command-prompt "split-window 'exec man %%'" #man
#bind '~' split-window "exec zsh -c 'htop -u fifr'" #htop
#bind '&' split-window "exec man -l ~/.tmux/tmux.1" #man tmux

bind-key 'Space' next-window

# meta left/right cycles windows
bind-key -n M-right next
bind-key -n M-left prev

bind-key M-1 select-layout even-horizontal
bind-key M-2 select-layout even-vertical
bind-key M-3 select-layout main-horizontal
bind-key M-4 select-layout main-vertical
bind-key M-5 select-layout tiled



bind r source-file ~/.tmux.conf
